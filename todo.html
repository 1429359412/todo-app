<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo 待办事项</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #10b981;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .app {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Header */
  .header {
    text-align: center;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .date {
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-top: 4px;
  }

  /* Input */
  .input-group {
    display: flex;
    gap: 10px;
  }
  .input-group input {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    transition: var(--transition);
    outline: none;
  }
  .input-group input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.15);
  }
  .input-group input::placeholder {
    color: #9ca3af;
  }
  .btn {
    padding: 14px 24px;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79,70,229,.35);
  }
  .btn-primary:active {
    transform: translateY(0);
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    background: var(--card);
    padding: 6px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .filter-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
  }
  .filter-btn:hover {
    color: var(--text);
    background: #f3f4f6;
  }
  .filter-btn.active {
    background: var(--primary);
    color: #fff;
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }
  .stats .count {
    font-size: 0.875rem;
    color: var(--text-secondary);
  }
  .stats .count strong {
    color: var(--text);
  }
  .btn-clear {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: var(--transition);
  }
  .btn-clear:hover {
    background: #fef2f2;
  }

  /* Task List */
  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .task-list:empty::after {
    content: "还没有待办事项，添加一个吧 ✨";
    display: block;
    text-align: center;
    color: #9ca3af;
    padding: 48px 16px;
    font-size: 0.95rem;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    padding: 14px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: var(--transition);
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-item:hover {
    box-shadow: var(--shadow-lg);
  }
  .task-item.completed {
    opacity: 0.55;
  }
  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--text-secondary);
  }

  /* Custom checkbox */
  .checkbox-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .checkbox-wrap input {
    position: absolute;
    opacity: 0;
    width: 22px;
    height: 22px;
    cursor: pointer;
  }
  .checkmark {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border: 2px solid #d1d5db;
    border-radius: 6px;
    transition: var(--transition);
    cursor: pointer;
  }
  .checkbox-wrap input:checked + .checkmark {
    background: var(--success);
    border-color: var(--success);
  }
  .checkmark::after {
    content: "";
    display: none;
    width: 5px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-top: -2px;
  }
  .checkbox-wrap input:checked + .checkmark::after {
    display: block;
  }

  .task-text {
    flex: 1;
    font-size: 0.95rem;
    word-break: break-word;
  }

  /* Edit input */
  .task-edit-input {
    flex: 1;
    padding: 6px 10px;
    border: 2px solid var(--primary);
    border-radius: 6px;
    font-size: 0.95rem;
    outline: none;
    font-family: inherit;
    background: #fff;
  }

  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .btn-icon {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    transition: var(--transition);
    font-size: 1rem;
  }
  .btn-edit:hover { background: #eef2ff; color: var(--primary); }
  .btn-delete:hover { background: #fef2f2; color: var(--danger); }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 0.8rem;
    color: #b0b7c3;
    padding-top: 8px;
  }

  /* Empty state for filters */
  .empty-filter {
    display: none;
    text-align: center;
    color: #9ca3af;
    padding: 48px 16px;
    font-size: 0.95rem;
  }
  .empty-filter.visible {
    display: block;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>📋 待办事项</h1>
    <p class="date" id="dateDisplay"></p>
  </div>

  <!-- Input -->
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="添加新任务…" maxlength="200" autocomplete="off">
    <button class="btn btn-primary" id="addBtn">添加</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="active">进行中</button>
    <button class="filter-btn" data-filter="completed">已完成</button>
  </div>

  <!-- Task List -->
  <ul class="task-list" id="taskList"></ul>

  <!-- Empty filter state -->
  <div class="empty-filter" id="emptyFilter">没有匹配的任务</div>

  <!-- Stats -->
  <div class="stats">
    <span class="count" id="statsCount"></span>
    <button class="btn-clear" id="clearCompleted" style="display:none">清除已完成</button>
  </div>

  <!-- Footer -->
  <div class="footer">点击复选框标记完成 · 悬停任务可编辑或删除</div>
</div>

<script>
(function () {
  // ── State ──────────────────────────────────────────────
  const STORAGE_KEY = "todo_app_tasks";
  let tasks = [];
  let currentFilter = "all";

  // ── DOM ────────────────────────────────────────────────
  const $ = (sel) => document.querySelector(sel);
  const taskInput   = $("#taskInput");
  const addBtn      = $("#addBtn");
  const taskList    = $("#taskList");
  const emptyFilter = $("#emptyFilter");
  const statsCount  = $("#statsCount");
  const clearBtn    = $("#clearCompleted");
  const dateDisplay = $("#dateDisplay");
  const filterBtns  = document.querySelectorAll(".filter-btn");

  // ── Date ───────────────────────────────────────────────
  function updateDate() {
    const now = new Date();
    const opts = { year: "numeric", month: "long", day: "numeric", weekday: "long" };
    dateDisplay.textContent = now.toLocaleDateString("zh-CN", opts);
  }

  // ── Persistence ────────────────────────────────────────
  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    } catch {
      tasks = [];
    }
  }
  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const filtered = tasks.filter((t) => {
      if (currentFilter === "active")     return !t.done;
      if (currentFilter === "completed")  return t.done;
      return true;
    });

    // Empty state
    if (tasks.length === 0) {
      emptyFilter.classList.remove("visible");
    } else if (filtered.length === 0) {
      emptyFilter.classList.add("visible");
    } else {
      emptyFilter.classList.remove("visible");
    }

    // Build list
    taskList.innerHTML = filtered
      .map(
        (t) => `
      <li class="task-item${t.done ? " completed" : ""}" data-id="${t.id}">
        <label class="checkbox-wrap">
          <input type="checkbox" ${t.done ? "checked" : ""} onchange="todoApp.toggle('${t.id}')">
          <span class="checkmark"></span>
        </label>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <div class="task-actions">
          <button class="btn-icon btn-edit" title="编辑" onclick="todoApp.startEdit('${t.id}')">✏️</button>
          <button class="btn-icon btn-delete" title="删除" onclick="todoApp.remove('${t.id}')">🗑️</button>
        </div>
      </li>`
      )
      .join("");

    // Stats
    const remaining = tasks.filter((t) => !t.done).length;
    const total = tasks.length;
    if (total === 0) {
      statsCount.innerHTML = "暂无任务";
    } else if (remaining === 0) {
      statsCount.innerHTML = "🎉 全部完成!";
    } else {
      statsCount.innerHTML = `共 <strong>${total}</strong> 项，还剩 <strong>${remaining}</strong> 项`;
    }

    // Clear completed button
    const hasCompleted = tasks.some((t) => t.done);
    clearBtn.style.display = hasCompleted ? "" : "none";
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Actions ────────────────────────────────────────────
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.focus();
      return;
    }
    tasks.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2),
      text,
      done: false,
      createdAt: Date.now(),
    });
    saveTasks();
    taskInput.value = "";
    taskInput.focus();
    render();
  }

  function toggleTask(id) {
    const task = tasks.find((t) => t.id === id);
    if (task) {
      task.done = !task.done;
      saveTasks();
      render();
    }
  }

  function removeTask(id) {
    tasks = tasks.filter((t) => t.id !== id);
    saveTasks();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter((t) => !t.done);
    saveTasks();
    render();
  }

  function setFilter(filter) {
    currentFilter = filter;
    filterBtns.forEach((b) => b.classList.toggle("active", b.dataset.filter === filter));
    render();
  }

  // ── Inline Edit ────────────────────────────────────────
  function startEdit(id) {
    const item = document.querySelector(`.task-item[data-id="${id}"]`);
    if (!item) return;
    const textEl = item.querySelector(".task-text");
    const origText = tasks.find((t) => t.id === id)?.text ?? "";
    const input = document.createElement("input");
    input.type = "text";
    input.className = "task-edit-input";
    input.value = origText;
    input.maxLength = 200;

    textEl.replaceWith(input);
    input.focus();
    input.select();

    const finish = (save) => {
      const newText = input.value.trim();
      if (save && newText && newText !== origText) {
        const task = tasks.find((t) => t.id === id);
        if (task) {
          task.text = newText;
          saveTasks();
        }
      }
      render();
    };

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter")  finish(true);
      if (e.key === "Escape") finish(false);
    });
    input.addEventListener("blur", () => finish(true));
  }

  // ── Event Listeners ────────────────────────────────────
  addBtn.addEventListener("click", addTask);
  taskInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTask();
  });

  filterBtns.forEach((btn) => {
    btn.addEventListener("click", () => setFilter(btn.dataset.filter));
  });

  clearBtn.addEventListener("click", clearCompleted);

  // ── Expose for inline handlers ─────────────────────────
  window.todoApp = {
    toggle: toggleTask,
    remove: removeTask,
    startEdit: startEdit,
  };

  // ── Init ───────────────────────────────────────────────
  updateDate();
  loadTasks();
  render();
})();
</script>
</body>
</html>
